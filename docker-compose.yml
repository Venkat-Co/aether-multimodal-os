services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5.20
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1;'"]
      interval: 10s
      timeout: 10s
      retries: 20

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aether
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aether"]
      interval: 5s
      timeout: 5s
      retries: 20

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aether_metrics
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aether_metrics"]
      interval: 5s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev

  ingestion:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.ingestion.app.main:app
        SERVICE_PORT: 8001
    env_file:
      - .env.example
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  fusion:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.fusion.app.main:app
        SERVICE_PORT: 8002
    env_file:
      - .env.example
    ports:
      - "8002:8002"
    depends_on:
      ingestion:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  memory:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.memory.app.main:app
        SERVICE_PORT: 8003
    env_file:
      - .env.example
    ports:
      - "8003:8003"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  reasoning:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.reasoning.app.main:app
        SERVICE_PORT: 8004
    env_file:
      - .env.example
    ports:
      - "8004:8004"
    depends_on:
      memory:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  governance:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.governance.app.main:app
        SERVICE_PORT: 8005
    env_file:
      - .env.example
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  action:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.action.app.main:app
        SERVICE_PORT: 8006
    env_file:
      - .env.example
    ports:
      - "8006:8006"
    depends_on:
      governance:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8006/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  realtime:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.realtime.app.main:app
        SERVICE_PORT: 8007
    env_file:
      - .env.example
    ports:
      - "8007:8007"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8007/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  kernel:
    build:
      context: .
      dockerfile: infra/docker/python-service.Dockerfile
      args:
        SERVICE_MODULE: services.kernel.app.main:app
        SERVICE_PORT: 8008
    env_file:
      - .env.example
    ports:
      - "8008:8008"
    depends_on:
      ingestion:
        condition: service_healthy
      fusion:
        condition: service_healthy
      memory:
        condition: service_healthy
      reasoning:
        condition: service_healthy
      governance:
        condition: service_healthy
      action:
        condition: service_healthy
      realtime:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 20

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    environment:
      VITE_REALTIME_URL: http://localhost:8007
      VITE_WS_URL: ws://localhost:8007
    ports:
      - "3000:3000"
    depends_on:
      realtime:
        condition: service_healthy
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  neo4j_data:
  postgres_data:
  timescale_data:
