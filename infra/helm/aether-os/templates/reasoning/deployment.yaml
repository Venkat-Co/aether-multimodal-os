apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.fullname" . }}-reasoning
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.reasoning.replicaCount }}
  selector:
    matchLabels:
      app: reasoning
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: reasoning
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "aether.serviceAccountName" . }}
      containers:
        - name: reasoning
          image: {{ .Values.services.reasoning.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.reasoning.port }}
          resources:
            {{- toYaml .Values.services.reasoning.resources | nindent 12 }}
          {{- if .Values.services.reasoning.gpuEnabled }}
          env:
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.fullname" . }}-reasoning
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: reasoning
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.services.reasoning.port }}

