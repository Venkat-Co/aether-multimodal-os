apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aether.fullname" . }}-ingestion-config
  namespace: {{ .Values.global.namespace }}
data:
  AETHER_ENV: production
  AETHER_LOG_LEVEL: INFO
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.fullname" . }}-ingestion
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ingestion
    {{- include "aether.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.ingestion.replicaCount }}
  selector:
    matchLabels:
      app: ingestion
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: ingestion
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "aether.serviceAccountName" . }}
      containers:
        - name: ingestion
          image: {{ .Values.services.ingestion.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.ingestion.port }}
          envFrom:
            - configMapRef:
                name: {{ include "aether.fullname" . }}-ingestion-config
          resources:
            {{- toYaml .Values.services.ingestion.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.fullname" . }}-ingestion
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: ingestion
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.services.ingestion.port }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "aether.fullname" . }}-ingestion
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "aether.fullname" . }}-ingestion
  minReplicas: {{ .Values.services.ingestion.replicaCount }}
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

