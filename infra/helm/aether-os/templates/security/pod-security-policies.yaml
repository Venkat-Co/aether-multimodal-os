apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aether.fullname" . }}-critical-services
  namespace: {{ .Values.global.namespace }}
spec:
  minAvailable: 1
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: ["fusion", "memory", "reasoning", "governance"]

