apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.fullname" . }}-memory
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.memory.replicaCount }}
  selector:
    matchLabels:
      app: memory
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: memory
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "aether.serviceAccountName" . }}
      containers:
        - name: memory
          image: {{ .Values.services.memory.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.memory.port }}
          resources:
            {{- toYaml .Values.services.memory.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.fullname" . }}-memory
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: memory
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.services.memory.port }}

