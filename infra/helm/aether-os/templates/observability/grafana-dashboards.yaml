apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aether.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.global.namespace }}
data:
  aether-dashboard.json: |
    {
      "title": "AETHER Operational Overview",
      "schemaVersion": 39,
      "panels": [
        {"type": "timeseries", "title": "Fusion Latency"},
        {"type": "stat", "title": "Governance Decisions"},
        {"type": "timeseries", "title": "Action Dispatch Failures"}
      ]
    }

