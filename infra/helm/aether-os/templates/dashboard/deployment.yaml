apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.fullname" . }}-realtime
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.realtime.replicaCount }}
  selector:
    matchLabels:
      app: realtime
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: realtime
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "aether.serviceAccountName" . }}
      containers:
        - name: realtime
          image: {{ .Values.services.realtime.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.realtime.port }}
          resources:
            {{- toYaml .Values.services.realtime.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.fullname" . }}-realtime
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: realtime
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.services.realtime.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aether.fullname" . }}-dashboard
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.services.dashboard.replicaCount }}
  selector:
    matchLabels:
      app: dashboard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: dashboard
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.services.dashboard.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.services.dashboard.port }}
          resources:
            {{- toYaml .Values.services.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aether.fullname" . }}-dashboard
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.services.dashboard.port }}

