apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aether.fullname" . }}-postgres
  namespace: {{ .Values.global.namespace }}
spec:
  serviceName: {{ include "aether.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.databases.postgres.image }}
          env:
            - name: POSTGRES_DB
              value: aether
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.databases.postgres.storage }}
---
