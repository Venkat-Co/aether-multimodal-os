{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aether.fullname" . }}
  namespace: {{ .Values.global.namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/v1/kernel
            pathType: Prefix
            backend:
              service:
                name: {{ include "aether.fullname" . }}-kernel
                port:
                  number: 80
          - path: /api/v1/realtime
            pathType: Prefix
            backend:
              service:
                name: {{ include "aether.fullname" . }}-realtime
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "aether.fullname" . }}-realtime
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aether.fullname" . }}-dashboard
                port:
                  number: 80
{{- end }}
